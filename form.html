<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 그린맵 관찰 기록 제출</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f0; min-height: 100vh; }
.header {
  background: linear-gradient(135deg, #2d6a4f, #40916c);
  color: white;
  padding: 16px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header h1 { font-size: 18px; font-weight: 700; }
.header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 4px; }
.container { max-width: 500px; margin: 0 auto; padding: 16px; }
.photo-guide {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.photo-guide h2 {
  font-size: 15px;
  font-weight: 700;
  color: #1b4332;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.photo-examples {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.photo-example {
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #d8f3dc;
}
.photo-example .photo-placeholder {
  width: 100%;
  height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}
.photo-example .photo-placeholder .bg-icon { font-size: 48px; margin-bottom: 4px; }
.photo-example .photo-label {
  background: #2d6a4f;
  color: white;
  text-align: center;
  padding: 6px 4px;
  font-size: 11px;
  font-weight: 600;
}
.photo-example:nth-child(1) .photo-placeholder { background: linear-gradient(135deg, #d8f3dc, #b7e4c7); }
.photo-example:nth-child(2) .photo-placeholder { background: linear-gradient(135deg, #b7e4c7, #95d5b2); }
.photo-example:nth-child(3) .photo-placeholder { background: linear-gradient(135deg, #95d5b2, #74c69d); }
.photo-tip {
  background: #f0f7f0;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #2d6a4f;
  line-height: 1.6;
}
.photo-tip strong { color: #1b4332; }
.form-link-section {
  background: white;
  border-radius: 14px;
  padding: 20px 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  text-align: center;
}
.form-link-section p {
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.5;
}
.form-btn {
  display: inline-block;
  padding: 14px 32px;
  background: linear-gradient(135deg, #2d6a4f, #40916c);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  box-shadow: 0 4px 12px rgba(45,106,79,0.3);
}
.form-wrapper {
  background: white;
  border-radius: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  overflow: hidden;
}
.form-wrapper iframe {
  width: 100%;
  min-height: 1800px;
  border: none;
}
.back-link {
  display: block;
  text-align: center;
  color: #40916c;
  font-size: 13px;
  padding: 12px;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="header">
  <h1>🌿 관찰 기록 제출</h1>
  <div class="subtitle">그린맵 GreenMap - 육민관중학교 STEAM 동아리</div>
</div>
<div class="container">
  <div class="photo-guide">
    <h2>📸 이렇게 찍어주세요! (3장)</h2>
    <div class="photo-examples">
      <div class="photo-example">
        <div class="photo-placeholder">
          <span class="bg-icon">🌳</span>
          <span style="font-size:11px; color:#2d6a4f;">전체</span>
        </div>
        <div class="photo-label">① 전체 모습</div>
      </div>
      <div class="photo-example">
        <div class="photo-placeholder">
          <span class="bg-icon">🌿</span>
          <span style="font-size:11px; color:#2d6a4f;">가까이</span>
        </div>
        <div class="photo-label">② 잎 클로즈업</div>
      </div>
      <div class="photo-example">
        <div class="photo-placeholder">
          <span class="bg-icon">🌸</span>
          <span style="font-size:11px; color:#2d6a4f;">특징</span>
        </div>
        <div class="photo-label">③ 꽃/열매/수피</div>
      </div>
    </div>
    <div class="photo-tip">
      <strong>촬영 팁:</strong> 식물의 <strong>전체 모습</strong>(크기 비교 가능하게), <strong>잎의 앞·뒷면</strong>(잎맥, 털 유무 확인), <strong>꽃이나 열매, 수피 등 특징</strong>을 각각 찍어주세요.
    </div>
  </div>
  <div class="form-link-section">
    <p>📋 아래 구글 폼에서 관찰 기록을 작성해 주세요</p>
    <a href="https://docs.google.com/forms/d/1Nm9C-m3TLiEtCTttYbtkf7ifc6Xg0h-n2qbiPB7Nvf8/viewform" target="_blank" class="form-btn">📝 관찰 기록 작성하기</a>
  </div>
  <div class="form-wrapper">
    <iframe src="https://docs.google.com/forms/d/1Nm9C-m3TLiEtCTttYbtkf7ifc6Xg0h-n2qbiPB7Nvf8/viewform?embedded=true"
            frameborder="0" marginheight="0" marginwidth="0">로딩 중…</iframe>
  </div>
  <a href="index.html" class="back-link">← 그린맵으로 돌아가기</a>
</div>
</body>
</html>
